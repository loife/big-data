service: hn-fetcher-lambda

frameworkVersion: '4'

provider:
  name: aws
  runtime: python3.12
  region: eu-central-1
  memorySize: 512
  timeout: 300

  environment:
    HN_BUCKET: ${param:hnBucketName}

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - s3:PutObject
          Resource:
            - arn:aws:s3:::${param:hnBucketName}/*

functions:
  fetchHackerNewsPosts:
    handler: handler.fetch_hacker_news
    events:
      - schedule:
          method: scheduler
          rate: cron(0 0 * * ? *)
          timezone: Europe/Belgrade

custom:
  pythonRequirements:
    slim: true
    dockerizePip: non-linux